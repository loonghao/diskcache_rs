name: Performance Benchmark

on:
  pull_request:
    paths:
      - 'src/**'
      - 'benchmarks/**'
      - 'Cargo.toml'
      - 'pyproject.toml'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Performance Comparison
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: |
          uv sync --group benchmark

      - name: Build extension (release mode)
        run: uv pip install -e .

      - name: Run performance benchmarks
        run: |
          uv run python benchmarks/performance_comparison.py

      - name: Run pytest benchmarks
        run: |
          uv run python -m pytest tests/test_performance.py -v -k "benchmark" --benchmark-skip

      - name: Run official benchmark comparison
        run: |
          uv run python tests/benchmark_official.py -n 1000

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark_results.json
        if: always()

      - name: Comment PR with benchmark results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            try {
              const results = JSON.parse(fs.readFileSync('benchmark_results.json', 'utf8'));

              let comment = '## 📊 Performance Benchmark Results\n\n';
              comment += '| Benchmark | Metric | python-diskcache | diskcache_rs | Winner |\n';
              comment += '|-----------|--------|------------------|--------------|--------|\n';

              const addRow = (name, metric, dcOps, rsOps) => {
                if (!dcOps || !rsOps) return;
                const winner = dcOps > rsOps
                  ? `python-diskcache (${(dcOps/rsOps).toFixed(1)}x)`
                  : `diskcache_rs (${(rsOps/dcOps).toFixed(1)}x)`;
                comment += `| ${name} | ${metric} | ${dcOps.toFixed(1)} ops/s | ${rsOps.toFixed(1)} ops/s | ${winner} |\n`;
              };

              for (const [name, result] of Object.entries(results)) {
                if (!result.diskcache || !result.diskcache_rs) continue;

                const weighted = result.weighted_ops_per_sec || {};
                addRow(name, 'weighted', weighted.diskcache, weighted.diskcache_rs);

                for (const metric of ['get', 'set', 'delete']) {
                  addRow(
                    name,
                    metric,
                    result.diskcache[metric]?.ops_per_sec,
                    result.diskcache_rs[metric]?.ops_per_sec
                  );
                }
              }

              comment += '\n> 💡 **Note**: Performance varies based on storage type and network conditions.\n';
              comment += '> diskcache_rs is optimized for network filesystems and provides better reliability.\n';

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.error('Failed to post benchmark results:', error);
            }
